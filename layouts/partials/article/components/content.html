<style>
    /* 設定 Obsidian 內部連結的顏色與底線 */
    .article-content a.internal-link {
        color: #2483ff; /* 你喜歡的藍色 */
        text-decoration: none;
        border-bottom: 1px dashed #2483ff; /* 虛線底線，更有筆記感 */
        transition: all 0.3s;
    }

    /* 滑鼠移上去時的變化 */
    .article-content a.internal-link:hover {
        color: #0056b3;
        border-bottom: 1px solid #0056b3;
        background-color: rgba(36, 131, 255, 0.1); /* 淡淡的背景色 */
    }
</style>

<section class="article-content">
    {{ $content := .Content }}
    
    {{/* 1. 處理帶有別名的連結 [[檔案名稱|顯示文字]] */}}
    {{ $content = $content | replaceRE `\[\[([^\]|]+)\|([^\]]+)\]\]` "<a href=\"/p/$1\" class=\"internal-link\">$2</a>" }}
    
    {{/* 2. 處理一般連結 [[檔案名稱]] */}}
    {{ $content = $content | replaceRE `\[\[([^\]|]+)\]\]` "<a href=\"/p/$1\" class=\"internal-link\">$1</a>" }}
    
    {{/* 輸出處理後的內容 */}}
    {{ $content | safeHTML }}
</section>
